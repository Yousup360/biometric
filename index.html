
<script>
    let db = []; 
    let rpt = [];

    const toB64 = (b) => btoa(String.fromCharCode(...new Uint8Array(b)));

    async function reg() {
        const n = prompt("নাম:");
        if (!n) return;
        try {
            const opt = {
                publicKey: {
                    challenge: crypto.getRandomValues(new Uint8Array(32)),
                    rp: { name: "Attendance System", id: window.location.hostname || "localhost" },
                    user: { 
                        id: crypto.getRandomValues(new Uint8Array(16)), 
                        name: n, 
                        displayName: n 
                    },
                    pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                    authenticatorSelection: { authenticatorAttachment: "platform" },
                    timeout: 60000
                }
            };
            const c = await navigator.credentials.create(opt);
            if (c) {
                db.push({ id: toB64(c.rawId), n: n });
                render();
                alert("নিবন্ধন সফল!");
            }
        } catch (e) { 
            console.error(e);
            alert("নিবন্ধন ব্যর্থ! নিশ্চিত করুন আপনি HTTPS বা Localhost ব্যবহার করছেন।"); 
        }
    }

    async function attn() {
        if (db.length === 0) return alert("প্রথমে অন্তত একজন ইউজার রেজিস্টার করুন!");
        const m = document.getElementById('msg');
        m.innerText = "স্ক্যানার চালু হয়েছে...";
        
        try {
            // allowCredentials সেট করা হয়েছে যাতে ব্রাউজার শুধু রেজিস্টার্ড ফিঙ্গারপ্রিন্ট খোঁজে
            const a = await navigator.credentials.get({
                publicKey: { 
                    challenge: crypto.getRandomValues(new Uint8Array(32)),
                    allowCredentials: db.map(u => ({
                        id: Uint8Array.from(atob(u.id), c => c.charCodeAt(0)),
                        type: 'public-key'
                    })),
                    userVerification: "required" 
                }
            });

            if (a) {
                const kid = toB64(a.rawId);
                const s = db.find(x => x.id === kid);
                if (s) {
                    rpt.unshift({ n: s.n, t: new Date().toLocaleTimeString() });
                    render();
                    m.innerText = "সফল: " + s.n;
                    m.className = "mt-4 text-[10px] font-bold uppercase text-emerald-500";
                } else {
                    m.innerText = "ইউজার ডাটাবেসে নেই!";
                    m.className = "mt-4 text-[10px] font-bold uppercase text-red-500";
                }
            }
        } catch (e) { 
            m.innerText = "ভেরিফিকেশন ব্যর্থ বা বাতিল!"; 
            m.className = "mt-4 text-[10px] font-bold uppercase text-red-500";
        }
    }

    // বাকি render এবং tab ফাংশন আগের মতোই থাকবে...
</script>

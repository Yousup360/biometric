<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart School - Local Storage Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .student-card { transition: all 0.3s ease; }
        .scanning { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-3xl shadow-sm mb-10 border border-slate-200">
            <div>
                <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">স্টুডেন্ট ডাটাবেস (Local)</h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Biometric Enrollment System</p>
            </div>
            <div class="flex gap-4 mt-4 md:mt-0">
                <button onclick="addNewStudent()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-bold shadow-lg transition-all flex items-center gap-2">
                    <i class="fas fa-plus"></i> নতুন ছাত্র
                </button>
                <button onclick="clearAllData()" class="bg-red-100 text-red-600 hover:bg-red-200 px-6 py-3 rounded-2xl font-bold transition-all">
                    সব মুছুন
                </button>
            </div>
        </header>

        <div id="studentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    

    <script>
        // পেজ লোড হলে ডাটা রিট্রিভ করা
        window.onload = loadFromStorage;

        // ১. নতুন ছাত্রের ফিল্ড তৈরি (UI + Logic)
        function addNewStudent(name = '', bio = '', id = Date.now()) {
            const grid = document.getElementById('studentGrid');
            const card = document.createElement('div');
            card.id = `student-${id}`;
            card.className = "student-card bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm space-y-4 relative overflow-hidden";
            
            card.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Student Card</span>
                    <button onclick="deleteStudent(${id})" class="text-slate-300 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt"></i></button>
                </div>

                <div class="space-y-3">
                    <input type="text" oninput="saveToStorage()" id="name-${id}" value="${name}" placeholder="ছাত্রের নাম..." 
                        class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-3 text-sm font-bold focus:border-blue-500 outline-none transition-all">
                    
                    <div class="relative group">
                        <textarea readonly id="bio-${id}" placeholder="বায়োমেট্রিক আইডি..." 
                            class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-3 text-[10px] font-mono text-blue-600 h-24 resize-none outline-none">${bio}</textarea>
                        
                        <button onclick="scanFingerprint(${id})" id="btn-${id}" class="absolute bottom-3 right-3 w-10 h-10 bg-slate-900 text-white rounded-xl shadow-xl flex items-center justify-center hover:bg-blue-600 transition-all active:scale-90">
                            <i class="fas fa-fingerprint"></i>
                        </button>
                    </div>
                </div>
            `;
            grid.prepend(card);
            saveToStorage();
        }

        // ২. বায়োমেট্রিক স্ক্যানিং
        async function scanFingerprint(id) {
            const name = document.getElementById(`name-${id}`).value;
            const bioField = document.getElementById(`bio-${id}`);
            const btn = document.getElementById(`btn-${id}`);

            if (!name) return alert("দয়া করে ছাত্রের নাম আগে লিখুন!");
            if (!window.PublicKeyCredential) return alert("বায়োমেট্রিক সাপোর্ট নেই।");

            btn.classList.add('scanning');

            try {
                const challenge = crypto.getRandomValues(new Uint8Array(32));
                const userId = new TextEncoder().encode(name + id);

                const options = {
                    publicKey: {
                        challenge: challenge,
                        rp: { name: "Smart School", id: window.location.hostname },
                        user: { id: userId, name: name, displayName: name },
                        pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                        authenticatorSelection: { authenticatorAttachment: "platform" },
                        timeout: 60000
                    }
                };

                const credential = await navigator.credentials.create(options);

                if (credential) {
                    bioField.value = credential.id; 
                    btn.classList.replace('bg-slate-900', 'bg-emerald-500');
                    saveToStorage(); // ডাটা পাওয়ার পর লোকাল স্টোরেজে সেভ
                }
            } catch (err) {
                console.error(err);
            } finally {
                btn.classList.remove('scanning');
            }
        }

        // ৩. লোকাল স্টোরেজে ডাটা সেভ করা
        function saveToStorage() {
            const students = [];
            const grid = document.getElementById('studentGrid').children;

            for (let card of grid) {
                const id = card.id.replace('student-', '');
                const name = document.getElementById(`name-${id}`).value;
                const bio = document.getElementById(`bio-${id}`).value;
                students.push({ id, name, bio });
            }

            localStorage.setItem('school_attendance_data', JSON.stringify(students));
        }

        // ৪. লোকাল স্টোরেজ থেকে ডাটা লোড করা
        function loadFromStorage() {
            const savedData = localStorage.getItem('school_attendance_data');
            if (savedData) {
                const students = JSON.parse(savedData);
                students.reverse().forEach(s => addNewStudent(s.name, s.bio, s.id));
            }
        }

        // ৫. ডিলিট এবং ক্লিয়ার লজিক
        function deleteStudent(id) {
            if (confirm("আপনি কি এই ছাত্রের ডাটা মুছে ফেলতে চান?")) {
                document.getElementById(`student-${id}`).remove();
                saveToStorage();
            }
        }

        function clearAllData() {
            if (confirm("সব ডাটা মুছে ফেলা হবে। আপনি কি নিশ্চিত?")) {
                localStorage.removeItem('school_attendance_data');
                document.getElementById('studentGrid').innerHTML = '';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সংখ্যা অনুযায়ী অ্যারে তৈরি</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 80%; padding: 10px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 6px; outline: none; }
        input:focus { border-color: #007bff; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; padding: 10px; background: #e9ecef; border-radius: 6px; word-wrap: break-word; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <h2>সংখ্যা ইনপুট দিন</h2>
    <input type="number" id="numInput" placeholder="উদা: 5, 10, 20..." min="1">
    <br>
    <button onclick="generateAndSaveArray()">অ্যারে তৈরি ও সেভ</button>

    <div id="outputSection" style="display: none;">
        <h4>সেভ করা অ্যারে:</h4>
        <div class="result" id="displayArea"></div>
    </div>
</div>

<script>
    // পেজ লোড হলে আগের ডেটা দেখাবে
    window.onload = showStoredData;

    function generateAndSaveArray() {
        const input = document.getElementById('numInput');
        const count = parseInt(input.value);

        if (isNaN(count) || count <= 0) {
            alert("দয়া করে একটি সঠিক সংখ্যা দিন (১ এর বেশি)!");
            return;
        }

        // ১. ইনপুট সংখ্যা অনুযায়ী অ্যারে তৈরি করা
        // উদাহরণ: ৫ দিলে [1, 2, 3, 4, 5] তৈরি হবে
        const newArray = [];
        for (let i = 1; i <= count; i++) {
            newArray.push(i);
        }

        // ২. লোকাল স্টোরেজে সেভ করা (JSON স্ট্রিং হিসেবে)
        localStorage.setItem('numberArray', JSON.stringify(newArray));

        // ৩. ইনপুট খালি করা এবং আউটপুট দেখানো
        input.value = "";
        showStoredData();
        alert("অ্যারে সফলভাবে সেভ হয়েছে!");
    }

    function showStoredData() {
        const storedData = localStorage.getItem('numberArray');
        const displayArea = document.getElementById('displayArea');
        const outputSection = document.getElementById('outputSection');

        if (storedData) {
            outputSection.style.display = "block";
            // স্ট্রিং থেকে আবার অ্যারেতে রূপান্তর করে দেখানো
            const parsedArray = JSON.parse(storedData);
            displayArea.textContent = JSON.stringify(parsedArray);
        }
    }
</script>

</body>
</html>

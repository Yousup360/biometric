<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro - Fixed Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .active-tab { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .tab-btn { transition: all 0.3s ease; border-radius: 12px; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-600">SMART ATTENDANCE</h1>
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button onclick="showTab('users')" id="tab-users" class="tab-btn px-6 py-2 text-sm font-bold active-tab">ইউজার লিস্ট</button>
                <button onclick="showTab('logs')" id="tab-logs" class="tab-btn px-6 py-2 text-sm font-bold text-slate-500">হাজিরার রিপোর্ট</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">

        <div id="view-users" class="space-y-6">
            <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold">নিবন্ধিত ছাত্র-ছাত্রী</h2>
                    <button onclick="enrollNewUser()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all">
                        + নতুন ছাত্র যোগ
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] text-slate-400 uppercase tracking-widest border-b">
                                <th class="pb-3">নাম</th>
                                <th class="pb-3">বায়োমেট্রিক আইডি (সংক্ষিপ্ত)</th>
                                <th class="pb-3 text-right">অ্যাকশন</th>
                            </tr>
                        </thead>
                        <tbody id="userList" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-logs" class="hidden space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-slate-900 text-white p-10 rounded-3xl text-center shadow-2xl">
                    <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl border border-slate-700">
                        <i class="fas fa-fingerprint text-blue-500"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-4">হাজিরা স্ক্যান</h3>
                    <button onclick="markAttendanceNow()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-500 active:scale-95 transition-all">
                        আঙুল রাখুন
                    </button>
                    <p id="auth-status" class="mt-4 text-xs font-bold text-slate-500 italic uppercase"></p>
                </div>

                <div class="lg:col-span-2 bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                    <h2 class="text-lg font-bold mb-6">আজকের উপস্থিতির তালিকা</h2>
                    <div class="overflow-y-auto max-h-[400px]">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] text-slate-400 uppercase border-b">
                                    <th class="pb-3">ছাত্রের নাম</th>
                                    <th class="pb-3">সময়</th>
                                    <th class="pb-3 text-right">স্ট্যাটাস</th>
                                </tr>
                            </thead>
                            <tbody id="logList" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    

    <script>
        // Data Storage
        let students = JSON.parse(localStorage.getItem('sys_students')) || [];
        let logs = JSON.parse(localStorage.getItem('sys_logs')) || [];

        window.onload = () => { renderUsers(); renderLogs(); };

        // ১. এনরোলমেন্ট (Registration)
        async function enrollNewUser() {
            const name = prompt("ছাত্রের নাম লিখুন:");
            if (!name) return;

            try {
                const challenge = crypto.getRandomValues(new Uint8Array(32));
                const options = {
                    publicKey: {
                        challenge: challenge,
                        rp: { name: "Attendance System", id: window.location.hostname },
                        user: { id: new TextEncoder().encode(name + Date.now()), name: name, displayName: name },
                        pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                        authenticatorSelection: { authenticatorAttachment: "platform" },
                        timeout: 60000
                    }
                };

                const credential = await navigator.credentials.create(options);
                
                if (credential) {
                    // মূল ফিক্স: কাঁচা ArrayBuffer আইডিকে স্ট্রিং এ রূপান্তর করে সেভ করা
                    const rawId = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
                    students.push({ id: rawId, name: name });
                    localStorage.setItem('sys_students', JSON.stringify(students));
                    renderUsers();
                    alert(name + " নিবন্ধিত হয়েছে!");
                }
            } catch (err) {
                alert("এনরোলমেন্ট ব্যর্থ! ব্রাউজার বা ডিভাইস চেক করুন।");
            }
        }

        // ২. হাজিরা (Verification)
        async function markAttendanceNow() {
            if (students.length === 0) return alert("আগে স্টুডেন্ট লিস্টে নাম যোগ করুন!");
            const status = document.getElementById('auth-status');
            status.innerText = "স্ক্যান হচ্ছে...";

            try {
                const challenge = crypto.getRandomValues(new Uint8Array(32));
                const assertion = await navigator.credentials.get({
                    publicKey: { challenge: challenge, userVerification: "required" }
                });

                if (assertion) {
                    // ইনকামিং আইডিকে স্ট্রিং এ রূপান্তর করে চেক করা
                    const incomingId = btoa(String.fromCharCode(...new Uint8Array(assertion.rawId)));
                    const student = students.find(s => s.id === incomingId);

                    if (student) {
                        logs.unshift({ name: student.name, time: new Date().toLocaleTimeString() });
                        localStorage.setItem('sys_logs', JSON.stringify(logs));
                        renderLogs();
                        status.innerText = "সফল: " + student.name;
                        status.className = "mt-4 text-xs font-bold text-emerald-500 italic uppercase";
                    } else {
                        status.innerText = "ভুল ডাটা: স্টুডেন্ট খুঁজে পাওয়া যায়নি!";
                        status.className = "mt-4 text-xs font-bold text-red-500 italic uppercase";
                    }
                }
            } catch (err) {
                status.innerText = "ব্যর্থ: ভেরিফিকেশন বাতিল!";
                status.className = "mt-4 text-xs font-bold text-red-500 italic uppercase";
            }
        }

        // --- হেল্পার ফাংশনসমূহ ---
        function renderUsers() {
            const body = document.getElementById('userList');
            body.innerHTML = students.map((s, i) => `
                <tr class="text-sm">
                    <td class="py-4 font-bold text-slate-700">${s.name}</td>
                    <td class="py-4 font-mono text-[10px] text-blue-500">${s.id.slice(0, 20)}...</td>
                    <td class="py-4 text-right">
                        <button onclick="delUser(${i})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function renderLogs() {
            const body = document.getElementById('logList');
            body.innerHTML = logs.map(l => `
                <tr class="text-sm">
                    <td class="py-3 font-bold text-slate-700">${l.name}</td>
                    <td class="py-3 text-slate-400 font-mono text-xs">${l.time}</td>
                    <td class="py-3 text-right"><span class="bg-emerald-50 text-emerald-600 px-2 py-1 rounded text-[10px] font-black">PRESENT</span></td>
                </tr>
            `).join('');
        }

        function showTab(name) {
            document.getElementById('view-users').classList.toggle('hidden', name !== 'users');
            document.getElementById('view-logs').classList.toggle('hidden', name !== 'logs');
            document.getElementById('tab-users').classList.toggle('active-tab', name === 'users');
            document.getElementById('tab-logs').classList.toggle('active-tab', name === 'logs');
        }

        function delUser(i) { students.splice(i, 1); localStorage.setItem('sys_students', JSON.stringify(students)); renderUsers(); }
    </script>
</body>
</html>

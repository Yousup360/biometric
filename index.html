<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart School - Dual View System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .active-tab { background-color: #3b82f6; color: white; border-radius: 12px; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="glass-header sticky top-0 z-50 border-b border-slate-200 px-6 py-4 mb-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-black text-slate-800 tracking-tighter uppercase">Attendance Pro v1.0</h1>
            
            <div class="flex bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                <button onclick="switchTab('enrollment')" id="tab-enrollment" class="px-6 py-2.5 text-sm font-bold transition-all active-tab">
                    <i class="fas fa-user-plus mr-2"></i> স্টুডেন্ট লিস্ট
                </button>
                <button onclick="switchTab('attendance')" id="tab-attendance" class="px-6 py-2.5 text-sm font-bold transition-all text-slate-500">
                    <i class="fas fa-clipboard-check mr-2"></i> হাজিরার রিপোর্ট
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pb-20">

        <div id="view-enrollment" class="space-y-6">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-xl font-bold text-slate-800">নিবন্ধিত স্টুডেন্ট তালিকা</h2>
                    <button onclick="enrollStudent()" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold text-sm shadow-xl hover:bg-black transition-all">
                        + নতুন ছাত্র যোগ করুন
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                                <th class="pb-4">নাম</th>
                                <th class="pb-4">বায়োমেট্রিক আইডি</th>
                                <th class="pb-4 text-right">অ্যাকশন</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody" class="divide-y divide-slate-50">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-attendance" class="hidden space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-blue-600 text-white p-10 rounded-[2.5rem] shadow-2xl text-center">
                    <div class="w-20 h-20 bg-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl shadow-inner">
                        <i class="fas fa-fingerprint"></i>
                    </div>
                    <h3 class="text-2xl font-bold mb-2">Punch In</h3>
                    <p class="text-blue-100 text-xs mb-8 opacity-80">ফিঙ্গারপ্রিন্ট দিয়ে হাজিরা নিশ্চিত করুন</p>
                    <button onclick="takeAttendance()" class="w-full bg-white text-blue-600 py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                        স্ক্যান করুন
                    </button>
                </div>

                <div class="lg:col-span-2 bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-slate-800">আজকের হাজিরার খাতা</h2>
                        <button onclick="clearLogs()" class="text-red-500 text-[10px] font-black uppercase tracking-widest border border-red-100 px-3 py-1 rounded-lg">Clear All</button>
                    </div>
                    <div class="overflow-y-auto max-h-[400px]">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                                    <th class="pb-3">স্টুডেন্ট নাম</th>
                                    <th class="pb-3">সময়</th>
                                    <th class="pb-3 text-right">স্ট্যাটাস</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceTableBody" class="divide-y divide-slate-50">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </main>

    

    <script>
        let students = JSON.parse(localStorage.getItem('st_users')) || [];
        let logs = JSON.parse(localStorage.getItem('st_attendance')) || [];

        window.onload = () => { renderUsers(); renderLogs(); };

        // ১. ট্যাব সুইচিং লজিক
        function switchTab(tabName) {
            document.getElementById('view-enrollment').classList.add('hidden');
            document.getElementById('view-attendance').classList.add('hidden');
            document.getElementById('tab-enrollment').classList.remove('active-tab', 'text-slate-500');
            document.getElementById('tab-attendance').classList.remove('active-tab', 'text-slate-500');

            if (tabName === 'enrollment') {
                document.getElementById('view-enrollment').classList.remove('hidden');
                document.getElementById('tab-enrollment').classList.add('active-tab');
                document.getElementById('tab-attendance').classList.add('text-slate-500');
            } else {
                document.getElementById('view-attendance').classList.remove('hidden');
                document.getElementById('tab-attendance').classList.add('active-tab');
                document.getElementById('tab-enrollment').classList.add('text-slate-500');
            }
        }

        // ২. স্টুডেন্ট এনরোলমেন্ট (টেবিল ১)
        async function enrollStudent() {
            const name = prompt("ছাত্রের নাম:");
            if (!name) return;

            try {
                const challenge = crypto.getRandomValues(new Uint8Array(32));
                const options = {
                    publicKey: {
                        challenge: challenge,
                        rp: { name: "School System", id: window.location.hostname },
                        user: { id: new TextEncoder().encode(name + Date.now()), name: name, displayName: name },
                        pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                        authenticatorSelection: { authenticatorAttachment: "platform" },
                        timeout: 60000
                    }
                };

                const credential = await navigator.credentials.create(options);
                if (credential) {
                    students.push({ id: credential.id, name: name });
                    localStorage.setItem('st_users', JSON.stringify(students));
                    renderUsers();
                }
            } catch (err) { alert("ব্যর্থ হয়েছে!"); }
        }

        function renderUsers() {
            const body = document.getElementById('userTableBody');
            body.innerHTML = students.map((s, i) => `
                <tr class="text-sm">
                    <td class="py-4 font-bold text-slate-700">${s.name}</td>
                    <td class="py-4 font-mono text-[10px] text-blue-500">${s.id.slice(0, 35)}...</td>
                    <td class="py-4 text-right">
                        <button onclick="delUser(${i})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // ৩. হাজিরা গ্রহণ (টেবিল ২)
        async function takeAttendance() {
            if (students.length === 0) return alert("আগে স্টুডেন্ট লিস্টে নাম যোগ করুন!");
            try {
                const challenge = crypto.getRandomValues(new Uint8Array(32));
                const assertion = await navigator.credentials.get({
                    publicKey: { challenge: challenge, userVerification: "required" }
                });

                if (assertion) {
                    const student = students.find(s => s.id === assertion.id) || { name: "অজানা ইউজার" };
                    logs.unshift({ name: student.name, time: new Date().toLocaleTimeString() });
                    localStorage.setItem('st_attendance', JSON.stringify(logs));
                    renderLogs();
                    alert(student.name + "-এর হাজিরা সফল!");
                }
            } catch (err) { alert("ভেরিফিকেশন ব্যর্থ!"); }
        }

        function renderLogs() {
            const body = document.getElementById('attendanceTableBody');
            body.innerHTML = logs.map(l => `
                <tr class="text-sm">
                    <td class="py-3 font-bold text-slate-700">${l.name}</td>
                    <td class="py-3 text-slate-400 font-mono text-xs">${l.time}</td>
                    <td class="py-3 text-right"><span class="bg-emerald-50 text-emerald-600 px-2 py-1 rounded text-[10px] font-black uppercase">PRESENT</span></td>
                </tr>
            `).join('');
        }

        function delUser(i) { students.splice(i, 1); localStorage.setItem('st_users', JSON.stringify(students)); renderUsers(); }
        function clearLogs() { logs = []; localStorage.setItem('st_attendance', JSON.stringify(logs)); renderLogs(); }
    </script>
</body>
</html>

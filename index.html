<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro v2.0 - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .active-tab { background-color: #1d4ed8; color: white; }
        .hidden { display: none; }
        .scanning-animation { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-white border-b sticky top-0 z-50 px-6 py-4 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-slate-800 tracking-tighter">ATTENDANCE PRO V2.0</h1>
            <div class="flex bg-slate-200 p-1 rounded-xl">
                <button onclick="switchTab('users')" id="btn-users" class="px-4 py-2 text-xs font-bold rounded-lg active-tab">স্টুডেন্ট লিস্ট</button>
                <button onclick="switchTab('logs')" id="btn-logs" class="px-4 py-2 text-xs font-bold rounded-lg text-slate-600">হাজিরার রিপোর্ট</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        
        <div id="view-users" class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-bold text-lg">নিবন্ধিত ছাত্র-ছাত্রী</h2>
                    <button onclick="enrollStudent()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700">+ নতুন ছাত্র</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[10px] text-slate-400 uppercase border-b">
                            <tr><th class="pb-3">নাম</th><th class="pb-3">বায়োমেট্রিক আইডি</th><th class="pb-3 text-right">অ্যাকশন</th></tr>
                        </thead>
                        <tbody id="userTable" class="divide-y divide-slate-50 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-logs" class="hidden space-y-6">
            <div class="bg-blue-600 p-10 rounded-[2.5rem] text-center text-white shadow-xl mb-8">
                <div id="fingerIcon" class="w-20 h-20 bg-blue-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner border border-blue-400">
                    <i class="fas fa-fingerprint"></i>
                </div>
                <h3 class="text-xl font-bold">হাজিরা দিন</h3>
                <p class="text-blue-100 text-xs mb-6 opacity-80">সেন্সরে আঙুল রাখুন</p>
                <button onclick="markAttendance()" class="w-full max-w-xs bg-white text-blue-600 py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">স্ক্যান করুন</button>
            </div>

            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold">আজকের হাজিরার খাতা</h2>
                    <button onclick="clearLogs()" class="text-red-500 text-[10px] font-bold uppercase tracking-tighter">Clear All</button>
                </div>
                <div class="overflow-y-auto max-h-60">
                    <table class="w-full text-left text-sm">
                        <thead class="text-[10px] text-slate-400 uppercase border-b">
                            <tr><th class="pb-2">নাম</th><th class="pb-2">সময়</th><th class="pb-2 text-right">স্ট্যাটাস</th></tr>
                        </thead>
                        <tbody id="logTable" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    
    <script>
        let students = JSON.parse(localStorage.getItem('v2_students')) || [];
        let logs = JSON.parse(localStorage.getItem('v2_logs')) || [];

        // ১. Helper: ArrayBuffer to Base64 (ফিক্সড ডাটা ফরমেট)
        const bufferToBase64 = (buffer) => btoa(String.fromCharCode(...new Uint8Array(buffer)));

        // ২. এনরোলমেন্ট লজিক
        async function enrollStudent() {
            const name = prompt("ছাত্রের নাম:");
            if (!name) return;

            try {
                const challenge = crypto.getRandomValues(new Uint8Array(32));
                const options = {
                    publicKey: {
                        challenge,
                        rp: { name: "Attendance System", id: window.location.hostname },
                        user: { id: crypto.getRandomValues(new Uint8Array(16)), name, displayName: name },
                        pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                        authenticatorSelection: { authenticatorAttachment: "platform" },
                        timeout: 60000
                    }
                };

                const credential = await navigator.credentials.create(options);
                if (credential) {
                    const idString = bufferToBase64(credential.rawId); // আইডি সেভ করার আগে কনভার্ট
                    students.push({ id: idString, name: name });
                    localStorage.setItem('v2_students', JSON.stringify(students));
                    renderAll();
                    alert("সফলভাবে নিবন্ধিত হয়েছে!");
                }
            } catch (err) { alert("রেজিস্ট্রেশন ব্যর্থ!"); }
        }

        // ৩. হাজিরা ভেরিফিকেশন (Fixing the "ব্যর্থ" issue)
        async function markAttendance() {
            if (students.length === 0) return alert("প্রথমে ছাত্র যোগ করুন!");
            document.getElementById('fingerIcon').classList.add('scanning-animation');

            try {
                const challenge = crypto.getRandomValues(new Uint8Array(32));
                const assertion = await navigator.credentials.get({
                    publicKey: { challenge, userVerification: "required" }
                });

                if (assertion) {
                    const incomingId = bufferToBase64(assertion.rawId); // ইনকামিং আইডি কনভার্ট
                    const student = students.find(s => s.id === incomingId);

                    if (student) {
                        logs.unshift({ name: student.name, time: new Date().toLocaleTimeString() });
                        localStorage.setItem('v2_logs', JSON.stringify(logs));
                        renderAll();
                        alert("উপস্থিতি নিশ্চিত: " + student.name);
                    } else {
                        alert("ভেরিফিকেশন ব্যর্থ! এই ফিঙ্গারপ্রিন্ট রেজিস্টার করা নেই।");
                    }
                }
            } catch (err) { console.error(err); }
            finally { document.getElementById('fingerIcon').classList.remove('scanning-animation'); }
        }

        // ৪. UI এবং ট্যাব লজিক
        function switchTab(tab) {
            document.getElementById('view-users').classList.toggle('hidden', tab !== 'users');
            document.getElementById('view-logs').classList.toggle('hidden', tab !== 'logs');
            document.getElementById('btn-users').classList.toggle('active-tab', tab === 'users');
            document.getElementById('btn-logs').classList.toggle('active-tab', tab === 'logs');
        }

        function renderAll() {
            document.getElementById('userTable').innerHTML = students.map((s, i) => `
                <tr><td class="py-3 font-bold">${s.name}</td><td class="py-3 text-[10px] font-mono text-blue-500">${s.id.slice(0, 20)}...</td><td class="text-right"><button onclick="delUser(${i})" class="text-red-300"><i class="fas fa-trash"></i></button></td></tr>
            `).join('');

            document.getElementById('logTable').innerHTML = logs.map(l => `
                <tr><td class="py-2 font-bold">${l.name}</td><td class="py-2 text-slate-400 text-xs">${l.time}</td><td class="text-right"><span class="bg-green-100 text-green-600 text-[10px] px-2 py-1 rounded font-black">PRESENT</span></td></tr>
            `).join('');
        }

        function delUser(i) { students.splice(i, 1); localStorage.setItem('v2_students', JSON.stringify(students)); renderAll(); }
        function clearLogs() { logs = []; localStorage.setItem('v2_logs', JSON.stringify(logs)); renderAll(); }

        window.onload = renderAll;
    </script>
</body>
</html>
